name: Deploy MS-Clientes to Azure

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout del código
        uses: actions/checkout@v4

      - name: 2. Configurar Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: 3. Compilar con Maven
        run: mvn clean package -DskipTests

      - name: 4. Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verificar secret de Docker username
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "DOCKER_USERNAME está vacío"
            exit 1
          else
            echo "DOCKER_USERNAME cargado correctamente"
          fi

      - name: 5. Build y Push de Imagen Docker
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ms-clientes:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/ms-clientes:latest

      - name: 6. Despliegue en Azure vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_IP }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            cd ~/proyecto-azure
            docker compose down --remove-orphans
            docker compose pull
            docker compose up -d
            docker compose ps
            docker logs ms-clientes --tail 50